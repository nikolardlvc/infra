apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: config-connector
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/my-cluster/infrastructure/config-connector
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 10m
