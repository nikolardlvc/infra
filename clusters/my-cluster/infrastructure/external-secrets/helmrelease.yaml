apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  interval: 30m

  chart:
    spec:
      chart: external-secrets
      version: "0.19.1"
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: external-secrets
      interval: 12h

  install:
    crds: CreateReplace

  upgrade:
    crds: CreateReplace

  values:
    installCRDs: true

    serviceAccount:
      create: false
      name: external-secrets
