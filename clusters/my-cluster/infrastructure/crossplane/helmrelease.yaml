apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crossplane
  namespace: crossplane-system
spec:
  interval: 30m

  chart:
    spec:
      chart: crossplane
      version: "2.0.4"
      sourceRef:
        kind: HelmRepository
        name: crossplane-stable
        namespace: crossplane-system
      interval: 12h

  install:
    crds: CreateReplace

  upgrade:
    crds: CreateReplace

  values: {}
