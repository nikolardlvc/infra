apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  interval: 30m
  chart:
    spec:
      chart: external-dns
      version: "1.20.0"
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: external-dns
      interval: 12h

  values:
    provider:
      name: google

    sources:
      - ingress
      - service

    domainFilters:
      - upondi.com

    policy: upsert-only

    registry: txt
    txtOwnerId: fh-burgenland-platform

    serviceAccount:
      create: false
      name: external-dns
